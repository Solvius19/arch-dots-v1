source = ~/.config/hypr/colors.conf

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ MODULAR CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

submap = passthru
# Dummy bind to force Hyprland to register the submap in memory.
# Since you will never press this, all normal keystrokes fall through to Quickshell
bind = SUPER SHIFT CTRL ALT, F35, exec, true
submap = reset

# --------------

source = ~/.config/hypr/config/monitors.conf
# ... the rest of your sources
# --------------

source = ~/.config/hypr/config/monitors.conf
source = ~/.config/hypr/config/env.conf
source = ~/.config/hypr/config/autostart.conf
source = ~/.config/hypr/config/variables.conf
source = ~/.config/hypr/config/settings.conf
source = ~/.config/hypr/config/rules.conf
source = ~/.config/hypr/config/keybindings.conf
exec-once = /usr/local/bin/hypr-pip-manager

# === DOTFILES AUTO-INJECTED ENV ===
env = XDG_PICTURES_DIR,/home/shreekhasnis/Pictures
env = XDG_VIDEOS_DIR,/home/shreekhasnis/Videos
env = WALLPAPER_DIR,/home/shreekhasnis/Pictures/Wallpapers
env = SCRIPT_DIR,/home/shreekhasnis/.config/hypr/scripts
env = QT_QPA_PLATFORMTHEME,qt6ct
# === END DOTFILES ENV ===

cursor {
    no_warps = true
}

